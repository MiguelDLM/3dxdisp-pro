name: Build & Release

# Runs when a version tag (v1.0, v2.3.1...) is pushed. Builds standalone
# binaries with PyInstaller and attaches them, plus a source tarball, to a
# GitHub Release for that tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System libraries (PySide6 needs them at analysis time)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 libxcb-cursor0 \
            fonts-dejavu-core

      - name: Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build settings app binary
        run: >
          pyinstaller --onefile --windowed
          --name spacepilot-lcd-settings lcd_settings.py

      - name: Build daemon binary
        run: >
          pyinstaller --onefile
          --name spacepilot-lcd-daemon spnav_lcd_daemon.py

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p "pkg/spacepilot-pro-lcd-${VERSION}"
          cp dist/spacepilot-lcd-settings dist/spacepilot-lcd-daemon \
             "pkg/spacepilot-pro-lcd-${VERSION}/"
          cp *.py *.rules spacepilot-lcd.service \
             spacepilot-lcd-settings.desktop requirements.txt \
             README.md LICENSE "pkg/spacepilot-pro-lcd-${VERSION}/"
          cp -r examples "pkg/spacepilot-pro-lcd-${VERSION}/"
          tar -C pkg -czf "spacepilot-pro-lcd-${VERSION}-linux-x86_64.tar.gz" \
              "spacepilot-pro-lcd-${VERSION}"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            spacepilot-pro-lcd-*.tar.gz
            dist/spacepilot-lcd-settings
            dist/spacepilot-lcd-daemon

      - name: Upload artifacts (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: spacepilot-pro-lcd
          path: |
            spacepilot-pro-lcd-*.tar.gz
            dist/spacepilot-lcd-settings
            dist/spacepilot-lcd-daemon
